<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Others — ViviCeramics</title>
    <meta name="description" content="Ceramic décor and accents — ViviCeramics." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="catalog-body" data-catalog="others">
    <header class="site-header">
      <div class="header-inner">
        <a class="logo-link" href="../index.html" aria-label="ViviCeramics home">
          <span class="logo-mark" aria-hidden="true"></span>
          ViviCeramics
        </a>
        <nav class="nav-main" aria-label="Primary">
          <a href="all.html" class="is-active" data-i18n="navProducts">All Product</a>
          <a href="../resources.html" data-i18n="navResources">Resources</a>
          <a href="../about.html" data-i18n="navAbout">About us</a>
          <a href="../contact.html" data-i18n="navContact">Contact</a>
        </nav>
        <div class="header-actions">
          <button type="button" class="icon-btn lang-btn" id="lang-toggle" aria-label="Switch language">EN</button>
          <a href="all.html" class="icon-btn" aria-label="Cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <path d="M6 8h15l-1.5 9H7.5L6 8zm0 0L5 3H2" stroke-linecap="round" stroke-linejoin="round" />
              <circle cx="9" cy="20" r="1.5" fill="currentColor" stroke="none" />
              <circle cx="18" cy="20" r="1.5" fill="currentColor" stroke="none" />
            </svg>
          </a>
          <a href="../login.html" class="icon-btn" aria-label="Account">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
              <circle cx="12" cy="8" r="3.5" />
              <path d="M5 20v-1c0-3 2.5-5.5 7-5.5s7 2.5 7 5.5v1" stroke-linecap="round" />
            </svg>
          </a>
        </div>
      </div>
    </header>

    <main class="pl-page" id="pl-catalog">
      <div class="pl-page-head">
        <h1 data-i18n="catalogTitleOthers">Others</h1>
        <p data-i18n="catalogSub">Hand-fired ceramics — limited autumn runs.</p>
      </div>

      <nav class="pl-subnav" aria-label="Collections">
        <a href="all.html" data-i18n="catalogNavAll">All</a>
        <a href="pumpkins.html" data-i18n="catalogNavPumpkins">Pumpkins</a>
        <a href="others.html" class="is-active" data-i18n="catalogNavOthers">Others</a>
      </nav>

      <div class="pl-toolbar">
        <div class="pl-toolbar-left">
          <label>
            <span data-i18n="catalogAvailability">Availability</span>
            <select aria-label="Filter by availability">
              <option>All</option>
              <option>In stock</option>
            </select>
          </label>
          <label>
            <span data-i18n="catalogPrice">Price</span>
            <select aria-label="Filter by price">
              <option>Any</option>
              <option>Under $100</option>
              <option>$100 – $200</option>
              <option>$200+</option>
            </select>
          </label>
        </div>
        <div class="pl-toolbar-right">
          <label>
            <span data-i18n="catalogSort">Sort by</span>
            <select aria-label="Sort products">
              <option data-i18n="catalogSortFeatured">Featured</option>
              <option>Price, low to high</option>
              <option>Price, high to low</option>
              <option>Newest</option>
            </select>
          </label>
          <span id="pl-count" class="pl-toolbar-count" data-i18n="catalogCount10">10 products</span>
        </div>
      </div>

      <section class="pl-section" aria-labelledby="sec-others">
        <h2 id="sec-others" class="visually-hidden" data-i18n="catalogOthersSection">Others</h2>
        <div class="pl-grid" id="pl-mount-others"></div>
      </section>

    </main>

    <footer class="site-footer">
      <p data-i18n="footer">© ViviCeramics. All hallows reserved.</p>
    </footer>

    <script src="../js/main.js"></script>
    <script src="../js/catalog-page.js"></script>
  </body>
</html>
